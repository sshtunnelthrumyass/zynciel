```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZYNC</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
}

/* VIDEO */
.video-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(0px) brightness(1);
    transition: filter 1.2s cubic-bezier(0.22,1,0.36,1);
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    transition: background 1.2s cubic-bezier(0.22,1,0.36,1);
    z-index: -1;
}

/* CENTER */
.container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    font-size: 128px;
    font-weight: 700;
    color: #C9C9C9;
    letter-spacing: 6px;
    opacity: 1;
    transition: opacity 0.8s ease;
}

.logo.fade-out {
    opacity: 0;
}

/* Z */
.z {
    transform: translateY(140px);
    opacity: 0;
}

/* YNC */
.ync {
    overflow: hidden;
    width: 0;
    margin-left: 12px;
}

.ync span {
    display: inline-block;
    transform: translateX(-40px);
    opacity: 0;
}

/* ANIMATIONS */
@keyframes zEnter {
    to { transform: translateY(0); opacity: 1; }
}

@keyframes yncReveal {
    to { width: 320px; }
}

@keyframes yncSlide {
    to { transform: translateX(0); opacity: 1; }
}

/* POPUP (no custom cursor) */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    display: none;
    z-index: 10;

    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), 
                opacity 0.3s ease;

    cursor: default; /* no grab cursor */
}

#popup.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

#popup img {
    width: 60vw;
    max-width: 900px;
    height: auto;
    user-select: none;
    pointer-events: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border-radius: 12px;
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="zynctest.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
    <div class="logo" id="logo">
        <div class="z" id="z">Z</div>
        <div class="ync" id="ync">
            <span id="letters">YNC</span>
        </div>
    </div>
</div>

<!-- POPUP -->
<div id="popup">
    <img src="zynciel.png" alt="popup">
</div>

<script>
const video = document.querySelector(".video-bg");
const overlay = document.querySelector(".overlay");
const z = document.getElementById("z");
const ync = document.getElementById("ync");
const letters = document.getElementById("letters");
const logo = document.getElementById("logo");
const popup = document.getElementById("popup");

/* POPUP FUNCTIONS */
function showPopup() {
    popup.style.display = "block";
    setTimeout(() => popup.classList.add("show"), 10);
}

function hidePopup() {
    popup.classList.remove("show");
    setTimeout(() => popup.style.display = "none", 300);
}

/* MAIN SEQUENCE */
function startSequence() {
    // blur in
    video.style.filter = "blur(12px) brightness(0.6)";
    overlay.style.background = "rgba(0,0,0,0.55)";

    setTimeout(() => {
        z.style.animation = "zEnter 0.9s cubic-bezier(0.22,1,0.36,1) forwards";

        z.addEventListener("animationend", () => {
            ync.style.animation = "yncReveal 0.7s cubic-bezier(0.22,1,0.36,1) forwards";

            setTimeout(() => {
                letters.style.animation = "yncSlide 0.7s cubic-bezier(0.22,1,0.36,1) forwards";

                // hold 3s
                setTimeout(() => {
                    logo.classList.add("fade-out");

                    // blur out
                    video.style.filter = "blur(0px) brightness(1)";
                    overlay.style.background = "rgba(0,0,0,0)";

                    setTimeout(() => {
                        showPopup();
                    }, 800);

                }, 3000);

            }, 120);

        }, { once: true });

    }, 200);
}

/* WAIT FOR VIDEO */
video.addEventListener("playing", () => {
    setTimeout(startSequence, 2000);
}, { once: true });

/* INSERT TOGGLE */
document.addEventListener("keydown", (e) => {
    if (e.key === "Insert") {
        if (popup.classList.contains("show")) {
            hidePopup();
        } else {
            showPopup();
        }
    }
});

/* DRAGGING (no cursor changes) */
let isDragging = false, offsetX = 0, offsetY = 0;

popup.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    popup.style.left = (e.clientX - offsetX) + "px";
    popup.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});
</script>

</body>
</html>
